services:
  postgres:
    image: postgres:15
    container_name: collabdoc_postgres
    environment:
      POSTGRES_USER: collabdoc
      POSTGRES_PASSWORD: collabdoc123
      POSTGRES_DB: collabdoc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: collabdoc_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: